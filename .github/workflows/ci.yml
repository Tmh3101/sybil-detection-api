name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff
        
    - name: Check formatting with Black
      run: black . --check --extend-exclude 'docs/colab-code/.*'
      
    - name: Lint with Ruff
      run: ruff check . --exclude docs/colab-code
